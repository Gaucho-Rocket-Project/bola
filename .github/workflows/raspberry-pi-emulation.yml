name: Build and Run in Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Run Project in Docker
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v $(pwd):/project \
            -w /project \
            balenalib/rpi-debian:bookworm \
            bash -c "
              set -e
              apt-get update &&
              apt-get install -y build-essential gcc g++ cmake git wget &&
              
              # Download prebuilt WiringPi binary
              wget https://github.com/WiringPi/WiringPi/releases/download/3.12/wiringpi_3.12_armhf.deb -O wiringpi.deb &&
              
              # Install the WiringPi binary
              dpkg -i wiringpi.deb || apt-get install -f -y &&
              
              cd /project &&
              mkdir -p build &&
              cd build &&
              cmake .. -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ &&
              make &&
              ./bin/main
            "

