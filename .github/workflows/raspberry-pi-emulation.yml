name: Build and Run in Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Run Project in Docker
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v $(pwd):/project \
            -w /project \
            balenalib/rpi-debian:bullseye \
            bash -c "
              apt-get update &&
              apt-get install -y build-essential gcc g++ cmake git wget &&
              # Install WiringPi
              git clone https://github.com/WiringPi/WiringPi.git /tmp/WiringPi &&
              cd /tmp/WiringPi &&
              sed -i 's/sudo //g' build &&  # Remove sudo from build script
              sed -i '/uninstall/d' build &&  # Remove uninstall command
              ./build &&
              # Set up project build
              cd /project &&
              mkdir -p build &&
              cd build &&
              cmake .. -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ &&
              make &&
              ./main  # Run your compiled executable
            "
