name: Raspberry Pi Emulation

on:
  push:
    branches:
      - main

jobs:
  emulate-pi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Enable ARM Emulation
        uses: docker/setup-qemu-action@v2

      - name: Run Raspberry Pi OS
        run: |
          docker run --rm -it --platform linux/arm/v7 arm32v7/debian:buster bash -c "echo 'Hello, Raspberry Pi!'"
