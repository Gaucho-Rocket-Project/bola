name: Build and Run CMake Project on Raspberry Pi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install QEMU and Set Up Multiarch
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build and Run Project in Docker
        run: |
          docker run --rm --platform linux/arm/v7 -v ${{ github.workspace }}:/project -w /project balenalib/raspberrypi3-debian:buster bash -c "
          apt-get update &&
          apt-get install -y build-essential wget &&
          apt-get remove -y cmake &&
          wget https://github.com/Kitware/CMake/releases/download/v3.25.0/cmake-3.25.0-Linux-aarch64.sh &&
          bash cmake-3.25.0-Linux-aarch64.sh --prefix=/usr/local --skip-license &&
          ln -sf /usr/local/bin/cmake /usr/bin/cmake &&
          gcc --version &&
          g++ --version &&
          mkdir -p build &&
          cd build &&
          cmake .. -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ &&
          make &&
          ./main"
