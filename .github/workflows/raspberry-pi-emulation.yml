name: Build and Test CMake Project on Raspberry Pi Emulation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  emulate-pi:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Check out code
        uses: actions/checkout@v3

      # Step 2: Set up Docker and ARM Emulation
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Enable ARM Emulation
        uses: docker/setup-qemu-action@v2

      # Step 3: Emulate Raspberry Pi and Run the CMake Project
      - name: Emulate Raspberry Pi
        run: |
          docker run --rm --platform linux/arm/v7 -v $(pwd):/project -w /project balenalib/raspberrypi3-debian:buster bash -c "
          apt-get update &&
          apt-get install -y cmake g++ make build-essential &&
          mkdir -p build &&
          cd build &&
          cmake .. &&
          make &&
          ./main"
