name: Build and Run Project in Docker

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up QEMU for multi-architecture support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: arm

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Pull and run the Docker container
      - name: Build and Run in Docker
        run: |
          docker run --rm --platform linux/arm/v7 -v ${{ github.workspace }}:/project -w /project arm32v7/debian:buster bash -c "
          apt-get update &&
          apt-get install -y build-essential git cmake &&
          git clone https://github.com/WiringPi/WiringPi.git /tmp/WiringPi &&
          cd /tmp/WiringPi &&
          ./build &&
          cd /project &&
          mkdir -p build &&
          cd build &&
          cmake .. &&
          make &&
          ./main"
