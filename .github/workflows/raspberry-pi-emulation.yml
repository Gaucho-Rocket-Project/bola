name: Build and Test CMake Project on Raspberry Pi Emulation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  emulate-pi:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Check out code
        uses: actions/checkout@v3

      # Step 2: Set up Docker and ARM Emulation
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Enable ARM Emulation
        uses: docker/setup-qemu-action@v2

      # Step 3: Emulate Raspberry Pi and Build CMake Project
      - name: Emulate Raspberry Pi
        run: |
          docker run --rm --platform linux/arm/v7 -v $(pwd):/project -w /project balenalib/raspberrypi3-debian:buster bash -c "
            apt-get update &&
            apt-get install -y build-essential wget &&
            apt-get remove -y cmake &&
            wget https://github.com/Kitware/CMake/releases/download/v3.25.0/cmake-3.25.0-Linux-aarch64.sh &&
            bash cmake-3.25.0-Linux-aarch64.sh --skip-license --prefix=/usr/local &&
            ln -sf /usr/local/bin/cmake /usr/bin/cmake &&
            gcc --version &&
            g++ --version &&
            mkdir -p build &&
            cd build &&
            cmake .. -DCMAKE_C_COMPILER=/usr/bin/gcc -DCMAKE_CXX_COMPILER=/usr/bin/g++ &&
            make &&
            ./<your-executable-name>"

